---
# =============================================================
# ROLE: 04_nginx — Install and configure Nginx
# =============================================================

- name: "NGINX | Install Nginx"
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: "NGINX | Start and enable Nginx"
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: "NGINX | Add nginx user to website user's group"
  ansible.builtin.user:
    name: nginx
    groups: "{{ wp_username }}"
    append: true

- name: "NGINX | Remove default Nginx server block if it exists"
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx

- name: "NGINX | Deploy WordPress server block from template"
  ansible.builtin.template:
    src: wordpress.conf.j2
    dest: "/etc/nginx/conf.d/{{ wp_sitename }}.conf"
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: "NGINX | Deploy phpMyAdmin server block from template"
  ansible.builtin.template:
    src: phpmyadmin.conf.j2
    dest: /etc/nginx/conf.d/phpmyadmin.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: "NGINX | Test Nginx configuration"
  ansible.builtin.command:
    cmd: nginx -t
  register: nginx_test
  changed_when: false
  failed_when: nginx_test.rc != 0

- name: "NGINX | Print Nginx test result"
  ansible.builtin.debug:
    msg: "{{ nginx_test.stderr }}"

- name: "NGINX | Reload Nginx"
  ansible.builtin.service:
    name: nginx
    state: reloaded
